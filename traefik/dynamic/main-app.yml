http:
  routers:
    main-app:
      rule: "HostRegexp(`.*`) && !PathPrefix(`/preview/`)"
      service: main-app-service
      entryPoints:
        - web
      priority: 1  # Lower priority than container routes

  services:
    main-app-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5173"