# OpenSail - Base Kustomize Configuration
# This is the base layer that gets patched by overlays for each environment
# Deploy with: kubectl apply -k overlays/<environment>/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tesslate

labels:
  - pairs:
      app.kubernetes.io/name: tesslate-studio
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

resources:
  # Namespaces
  - namespace/tesslate.yaml

  # Core Application
  - core/backend-deployment.yaml
  - core/backend-service.yaml
  - core/frontend-deployment.yaml
  - core/frontend-service.yaml
  - core/worker-deployment.yaml
  - core/gateway-deployment.yaml
  - core/snapshot-cleanup-cronjob.yaml
  - core/namespace-reaper-cronjob.yaml

  # Controller plane (Phase 4 — leader-elected cron + reconciler).
  # Replicas=2 active/passive via lease backend
  # (CONTROLLER_LEASE_BACKEND=db|redis|k8s, default db).
  - automations-controller/serviceaccount.yaml
  - automations-controller/rbac.yaml
  - automations-controller/deployment.yaml

  # OpenSail Connector Proxy (Phase 4 — opensail-runtime).
  # Standalone Deployment + Service + NetworkPolicy. Orchestrator runs
  # with CONNECTOR_PROXY_MODE=dedicated so its main.py skips the
  # in-process router mount; app pods reach this via in-cluster
  # OPENSAIL_RUNTIME_URL=http://opensail-runtime:8400.
  - opensail-runtime/

  # Redis (distributed backplane for horizontal scaling)
  - redis/

  # Database
  - database/postgres-deployment.yaml
  - database/postgres-service.yaml
  - database/postgres-pvc.yaml
  - database/postgres-pdb.yaml

  # PriorityClasses (cluster-scoped, apply manually):
  #   kubectl apply -f k8s/base/core/priority-classes.yaml

  # Compute Pool (ephemeral Tier 1 pods)
  # All compute-pool resources (namespace, network-policy, resource-quota) are
  # excluded from kustomize because the top-level `namespace: tesslate` renames
  # even cluster-scoped Namespace objects.  They're applied at runtime by
  # ComputeManager._ensure_compute_namespace() or manually via:
  #   kubectl apply -f k8s/base/compute-pool/

  # Volume Hub (canonical volume store, kube-system namespace)
  # Excluded from kustomize for the same namespace reason.  Deploy via:
  #   kubectl apply -k k8s/base/volume-hub/

  # Security & RBAC
  - security/network-policies.yaml
  - security/rbac.yaml
  - security/team-rbac.yaml
  - security/resource-quotas.yaml

# Images that can be overridden by overlays
images:
  - name: tesslate-backend
    newName: tesslate-backend
    newTag: latest
  - name: tesslate-frontend
    newName: tesslate-frontend
    newTag: latest
  - name: tesslate-devserver
    newName: tesslate-devserver
    newTag: latest
  - name: tesslate-ast
    newName: tesslate-ast
    newTag: latest

# ConfigMap generator for common config
configMapGenerator:
  - name: tesslate-config
    literals:
      - DEPLOYMENT_MODE=kubernetes
      - K8S_NAMESPACE_PER_PROJECT=true
      - K8S_ENABLE_NETWORK_POLICIES=true
