# See postgres-pdb.yaml for the full rationale.
# tl;dr: minAvailable: 1 with replicas: 1 = un-evictable forever.
# maxUnavailable: 1 = evictable now, still safe if scaled to 2+ later.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-pdb
  namespace: tesslate
  labels:
    app: redis
    component: cache
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: redis
      component: cache
