apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-volume-hub
  namespace: kube-system
  labels:
    app.kubernetes.io/name: tesslate-volume-hub
    app.kubernetes.io/component: volume-hub
    app.kubernetes.io/part-of: tesslate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tesslate-volume-hub
  template:
    metadata:
      labels:
        app: tesslate-volume-hub
        app.kubernetes.io/name: tesslate-volume-hub
        app.kubernetes.io/component: volume-hub
    spec:
      serviceAccountName: tesslate-volume-hub
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: hub
        image: tesslate-btrfs-csi:latest
        # Explicit Always: overlays change the tag from :latest to mutable
        # tags like :beta, which default the pull policy to IfNotPresent and
        # silently reuse stale cached digests after a push + rollout restart.
        # See services/btrfs-csi/deploy/manifests/node.yaml (DaemonSet) for
        # the same pattern on the CSI container.
        imagePullPolicy: Always
        args:
        - "--mode=hub"
        - "--hub-grpc-port=9750"
        - "--endpoint=unix:///run/csi/csi.sock"
        - "--node-id=$(NODE_NAME)"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        envFrom:
        - secretRef:
            name: tesslate-btrfs-csi-config
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - name: hub-grpc
          containerPort: 9750
          protocol: TCP
        volumeMounts:
        - name: socket-dir
          mountPath: /run/csi
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          tcpSocket:
            port: 9750
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 9750
          initialDelaySeconds: 15
          periodSeconds: 20

      - name: csi-provisioner
        image: registry.k8s.io/sig-storage/csi-provisioner:v5.1.0
        args:
        - "--csi-address=/run/csi/csi.sock"
        - "--leader-election=true"
        - "--feature-gates=Topology=true"
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: socket-dir
          mountPath: /run/csi
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

      - name: csi-snapshotter
        image: registry.k8s.io/sig-storage/csi-snapshotter:v8.2.0
        args:
        - "--csi-address=/run/csi/csi.sock"
        - "--leader-election=true"
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: socket-dir
          mountPath: /run/csi
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

      volumes:
      - name: socket-dir
        emptyDir: {}
