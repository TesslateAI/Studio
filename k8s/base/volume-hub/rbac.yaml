# ServiceAccount is NOT created here — it is managed per-environment:
#   AWS (production/beta): Terraform creates it with IRSA annotation (kubernetes.tf)
#   Minikube: minikube overlay creates it without IRSA
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tesslate-volume-hub
  labels:
    app.kubernetes.io/name: tesslate-volume-hub
rules:
# Node discovery for cache placement
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# Pod discovery for cache state
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Endpoints discovery for CSI node pod IP resolution
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]
# CSI provisioner: PV lifecycle
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch", "create", "delete", "patch"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
# CSI provisioner: StorageClass lookup
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]
# CSI provisioner: Events for PVC binding
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# CSI snapshotter: VolumeSnapshot lifecycle
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshots"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshotcontents"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshotcontents/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshots/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshotclasses"]
  verbs: ["get", "list", "watch"]
# CSI provisioner: CSINode topology
- apiGroups: ["storage.k8s.io"]
  resources: ["csinodes"]
  verbs: ["get", "list", "watch"]
# CSI provisioner: capacity reporting
- apiGroups: ["storage.k8s.io"]
  resources: ["csistoragecapacities"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# CSI provisioner + snapshotter: leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tesslate-volume-hub
  labels:
    app.kubernetes.io/name: tesslate-volume-hub
subjects:
- kind: ServiceAccount
  name: tesslate-volume-hub
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: tesslate-volume-hub
  apiGroup: rbac.authorization.k8s.io
