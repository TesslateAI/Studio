# Resource Quotas for Tesslate Platform
# Limits resource consumption in the tesslate namespace

apiVersion: v1
kind: ResourceQuota
metadata:
  name: tesslate-quota
  namespace: tesslate
spec:
  hard:
    # Pod limits
    pods: "20"

    # Compute limits (sized for rolling updates with maxSurge pods)
    requests.cpu: "12"
    requests.memory: "24Gi"
    limits.cpu: "24"
    limits.memory: "48Gi"

    # Storage limits
    persistentvolumeclaims: "10"
    requests.storage: "100Gi"

---
# LimitRange for default container resources
apiVersion: v1
kind: LimitRange
metadata:
  name: tesslate-limits
  namespace: tesslate
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
