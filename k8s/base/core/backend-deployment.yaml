# Tesslate Backend Deployment
# FastAPI application that manages projects, containers, and AI agents
#
# Environment-specific values (images, secrets) are patched by overlays

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-backend
  namespace: tesslate
  labels:
    app: tesslate-backend
    component: backend
spec:
  revisionHistoryLimit: 3
  replicas: 1  # Overridden by overlays for production
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Start new pod before killing old one
      maxUnavailable: 0   # Never kill old pod until new is ready
  selector:
    matchLabels:
      app: tesslate-backend
      component: backend
  template:
    metadata:
      labels:
        app: tesslate-backend
        component: backend
    spec:
      terminationGracePeriodSeconds: 60  # Allow long SSE streams to drain
      serviceAccountName: tesslate-backend-sa
      # Pod-wide SA token auto-mount is OFF. The backend needs the
      # token for cluster-API access; the AST sidecar must not see it.
      # We project the token explicitly onto the backend container only.
      automountServiceAccountToken: false
      volumes:
      # Replicates the default auto-mount shape (token + ca.crt +
      # namespace) so python-kubernetes client finds everything it
      # expects. Kubelet manages the token lifecycle here exactly as it
      # does for the implicit mount: BoundServiceAccountToken,
      # audience-bound, refreshed at 80% of expirationSeconds.
      - name: backend-sa-token
        projected:
          defaultMode: 0644
          sources:
          - serviceAccountToken:
              path: token
              expirationSeconds: 3600
          - configMap:
              name: kube-root-ca.crt
              items:
              - key: ca.crt
                path: ca.crt
          - downwardAPI:
              items:
              - path: namespace
                fieldRef:
                  fieldPath: metadata.namespace
      containers:
      - name: backend
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "5"]  # Let NGINX remove endpoint before SIGTERM
        image: tesslate-backend:latest  # Overridden by kustomization images
        imagePullPolicy: IfNotPresent  # Overridden to Always for production
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: backend-sa-token
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          readOnly: true
        env:
        # Core settings
        - name: DEPLOYMENT_MODE
          value: "kubernetes"
        - name: KUBERNETES_NAMESPACE
          value: "tesslate"

        # Database - from postgres-secret
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: DATABASE_URL

        # Security
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: SECRET_KEY
        - name: INTERNAL_API_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: INTERNAL_API_SECRET
              optional: true

        # LiteLLM Configuration
        - name: LITELLM_API_BASE
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: LITELLM_API_BASE
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: LITELLM_MASTER_KEY
        - name: LITELLM_DEFAULT_MODELS
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: LITELLM_DEFAULT_MODELS
        - name: LITELLM_TEAM_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: LITELLM_TEAM_ID
              optional: true
        - name: LITELLM_EMAIL_DOMAIN
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: LITELLM_EMAIL_DOMAIN
              optional: true
        - name: LITELLM_INITIAL_BUDGET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: LITELLM_INITIAL_BUDGET
              optional: true

        # JWT Config
        - name: ALGORITHM
          value: "HS256"
        - name: ACCESS_TOKEN_EXPIRE_MINUTES
          value: "30"

        # CORS & Domain
        - name: CORS_ORIGINS
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: CORS_ORIGINS
        - name: ALLOWED_HOSTS
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: ALLOWED_HOSTS
        - name: APP_DOMAIN
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: APP_DOMAIN
              optional: true
        - name: APP_BASE_URL
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: APP_BASE_URL
              optional: true
        - name: DEV_SERVER_BASE_URL
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: DEV_SERVER_BASE_URL
              optional: true

        # OAuth - Google
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: GOOGLE_CLIENT_ID
              optional: true
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: GOOGLE_CLIENT_SECRET
              optional: true
        - name: GOOGLE_OAUTH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: GOOGLE_OAUTH_REDIRECT_URI
              optional: true

        # OAuth - GitHub
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: GITHUB_CLIENT_ID
              optional: true
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: GITHUB_CLIENT_SECRET
              optional: true
        - name: GITHUB_OAUTH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: GITHUB_OAUTH_REDIRECT_URI
              optional: true

        # OAuth - Vercel (Deployment)
        - name: VERCEL_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: VERCEL_CLIENT_ID
              optional: true
        - name: VERCEL_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: VERCEL_CLIENT_SECRET
              optional: true
        - name: VERCEL_OAUTH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: VERCEL_OAUTH_REDIRECT_URI
              optional: true

        # OAuth - Netlify (Deployment)
        - name: NETLIFY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: NETLIFY_CLIENT_ID
              optional: true
        - name: NETLIFY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: NETLIFY_CLIENT_SECRET
              optional: true
        - name: NETLIFY_OAUTH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: NETLIFY_OAUTH_REDIRECT_URI
              optional: true

        # Deployment Providers - Heroku OAuth
        - name: HEROKU_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: HEROKU_CLIENT_ID
              optional: true
        - name: HEROKU_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: HEROKU_CLIENT_SECRET
              optional: true
        - name: HEROKU_OAUTH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: HEROKU_OAUTH_REDIRECT_URI
              optional: true

        # Deployment Providers - DigitalOcean OAuth
        - name: DIGITALOCEAN_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: DIGITALOCEAN_CLIENT_ID
              optional: true
        - name: DIGITALOCEAN_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: DIGITALOCEAN_CLIENT_SECRET
              optional: true
        - name: DIGITALOCEAN_OAUTH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: DIGITALOCEAN_OAUTH_REDIRECT_URI
              optional: true

        # Container Push Configuration
        - name: KANIKO_IMAGE
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: KANIKO_IMAGE
              optional: true
        - name: CONTAINER_PUSH_TIMEOUT
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: CONTAINER_PUSH_TIMEOUT
              optional: true
        - name: CONTAINER_PUSH_DEFAULT_CPU
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: CONTAINER_PUSH_DEFAULT_CPU
              optional: true
        - name: CONTAINER_PUSH_DEFAULT_MEMORY
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: CONTAINER_PUSH_DEFAULT_MEMORY
              optional: true

        # S3 Storage (Required for K8s - MinIO locally, real S3 in production)
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: S3_ACCESS_KEY_ID
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: S3_SECRET_ACCESS_KEY
        - name: S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: S3_BUCKET_NAME
        - name: S3_ENDPOINT_URL
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: S3_ENDPOINT_URL
        - name: S3_REGION
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: S3_REGION

        # Redis - Distributed backplane for horizontal scaling
        - name: REDIS_URL
          value: "redis://redis:6379/0"  # Patched by overlays for production (ElastiCache)

        # Kubernetes Settings (patched by overlays)
        - name: K8S_NAMESPACE_PER_PROJECT
          value: "true"
        - name: K8S_ENABLE_NETWORK_POLICIES
          value: "true"
        - name: K8S_STORAGE_CLASS
          value: "tesslate-block-storage"  # Abstract name, mapped per provider
        - name: K8S_PVC_SIZE
          value: "5Gi"
        - name: K8S_INGRESS_CLASS
          value: "nginx"
        - name: K8S_DEVSERVER_IMAGE
          value: "tesslate-devserver:latest"  # Patched by overlays
        - name: K8S_IMAGE_PULL_SECRET
          value: ""  # Empty for local, set for production
        - name: K8S_WILDCARD_TLS_SECRET
          value: ""  # Empty for local HTTP, set for production HTTPS

        # Pod Affinity Settings
        - name: K8S_ENABLE_POD_AFFINITY
          value: "true"
        - name: K8S_AFFINITY_TOPOLOGY_KEY
          value: "kubernetes.io/hostname"

        # Hibernation Settings
        - name: K8S_HIBERNATION_IDLE_MINUTES
          value: "30"
        - name: K8S_HIBERNATION_GRACE_SECONDS
          value: "120"
        - name: K8S_DEHYDRATION_EXCLUDE_PATTERNS
          value: "node_modules,.git,__pycache__,venv,.venv"

        # SMTP Configuration (for 2FA email codes)
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: SMTP_HOST
              optional: true
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: SMTP_USERNAME
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: SMTP_PASSWORD
              optional: true
        - name: SMTP_USE_TLS
          value: "true"
        - name: SMTP_SENDER_EMAIL
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: SMTP_SENDER_EMAIL
              optional: true
        - name: TWO_FA_ENABLED
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: TWO_FA_ENABLED
              optional: true

        # Cookie Settings (from app-secrets)
        - name: COOKIE_SECURE
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: COOKIE_SECURE
              optional: true
        - name: COOKIE_SAMESITE
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: COOKIE_SAMESITE
              optional: true
        - name: COOKIE_DOMAIN
          valueFrom:
            secretKeyRef:
              name: tesslate-app-secrets
              key: COOKIE_DOMAIN
              optional: true

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 24

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

      # ────────────────────────────────────────────────────────────────
      # AST sidecar — stateless Node gRPC service for JSX/TSX transforms
      # used by the design panel. Lives in the same pod so backend talks
      # to it via 127.0.0.1:9000; shares lifecycle + resource budget
      # with backend but has its own container, its own cgroup, its own
      # image, and its own probe. Fork-in-async bug that caused the
      # 2026-04-16 outage is impossible by construction — kubelet
      # spawns both containers, backend never forks to use AST.
      # ────────────────────────────────────────────────────────────────
      - name: ast
        image: tesslate-ast:latest  # Overridden by kustomization images
        imagePullPolicy: IfNotPresent  # Overridden per overlay
        ports:
        - containerPort: 9000
          name: grpc
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        # Bind to 0.0.0.0 so kubelet's gRPC probe (dials pod IP) works.
        # Port 9000 cross-pod is blocked by default-deny-ingress + no
        # allow rule opens it. Intra-pod (backend → 127.0.0.1:9000) is
        # kernel-local and never leaves the netns.
        - name: AST_BIND_HOST
          value: "0.0.0.0"
        - name: AST_BIND_PORT
          value: "9000"
        - name: LOG_LEVEL
          value: "info"
        # Piscina thread count — must match the container CPU limit or
        # threads starve each other. Default = 2 (base). Overlays bump
        # for bigger limits (prod = 4).
        - name: AST_POOL_THREADS
          value: "2"
        # Per-worker V8 heap cap so a pathological Babel parse can't
        # eat the container's memory limit. See pool.ts resourceLimits
        # for the matching codeRangeSize/young gen knobs.
        - name: AST_WORKER_MAX_OLD_MB
          value: "256"
        - name: AST_WORKER_MAX_YOUNG_MB
          value: "64"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
        # gRPC probes speak the standard grpc.health.v1.Health protocol
        # — kubelet dials the port and sends Check({service:""}). This
        # catches hung main threads / deadlocked gRPC servers that a
        # tcpSocket probe would miss (TCP accept works even if the
        # server can't serve a single RPC).
        startupProbe:
          grpc:
            port: 9000
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 24
        livenessProbe:
          grpc:
            port: 9000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          grpc:
            port: 9000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
