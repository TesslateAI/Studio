# automations-controller — dedicated ServiceAccount
#
# Phase 4 of the OpenSail Automation Runtime. The controller plane runs
# as its own Deployment with leader election (DBLease default; K8s Lease
# in production), so it owns its identity instead of borrowing the
# backend SA. RBAC is intentionally narrower than the backend SA — the
# controller never creates namespaces or PVCs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tesslate-automations-controller-sa
  namespace: tesslate
  labels:
    app: tesslate-automations-controller
    component: rbac
