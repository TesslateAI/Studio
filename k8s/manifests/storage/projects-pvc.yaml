# PersistentVolumeClaim for Backend Template Storage (tesslate namespace)
# This PVC stores the React/Vite project templates used by the backend
#
# NOTE: For user development environments, see:
# k8s/manifests/user-environments/projects-pvc.yaml

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tesslate-backend-templates-pvc
  namespace: tesslate
  labels:
    app: tesslate-backend
    component: templates
spec:
  # Use DigitalOcean's default block storage class
  storageClassName: do-block-storage

  # ReadWriteOnce - only backend pods need access
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 5Gi