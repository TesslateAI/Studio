# RBAC Configuration for Tesslate Backend
# This allows the backend service to manage user development environments
# Following principle of least privilege - only granting necessary permissions

---
# ServiceAccount for backend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tesslate-backend-sa
  namespace: tesslate
  labels:
    app: tesslate-backend
    component: rbac

---
# ClusterRole with minimal permissions needed for managing user environments
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tesslate-backend-role
  labels:
    app: tesslate-backend
    component: rbac
rules:
# Core resources - read only for discovery
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]

# Deployments - full CRUD for user environment pods
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Services - full CRUD for user environment services
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Ingresses - full CRUD for user environment ingress rules
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Pods - read access for status checking
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Pod logs - read access for debugging
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]

# ReplicaSets - read access for deployment status
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding - binds the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tesslate-backend-binding
  labels:
    app: tesslate-backend
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tesslate-backend-role
subjects:
- kind: ServiceAccount
  name: tesslate-backend-sa
  namespace: tesslate