# ClusterIssuer for Let's Encrypt certificate issuance
# Supports both HTTP-01 (for regular domains) and DNS-01 (for wildcard domains)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: manav@tesslate.com
    privateKeySecretRef:
      name: letsencrypt-prod
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    # HTTP-01 solver for regular domains
    - http01:
        ingress:
          class: nginx
      selector:
        dnsNames:
        - 'your-domain.com'
    # DNS-01 solver for wildcard domains (if using Cloudflare)
    # Uncomment if you want cert-manager to use Cloudflare API
    # - dns01:
    #     cloudflare:
    #       apiTokenSecretRef:
    #         name: cloudflare-api-token
    #         key: api-token
    #   selector:
    #     dnsNames:
    #     - '*.your-domain.com'
