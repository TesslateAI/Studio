apiVersion: batch/v1
kind: CronJob
metadata:
  name: dev-environment-cleanup
  namespace: tesslate
  labels:
    app: tesslate-backend
    component: cleanup
spec:
  # Run every 30 minutes to cleanup idle environments
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid  # Don't run multiple cleanup jobs simultaneously
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: tesslate-cleanup
        spec:
          serviceAccountName: tesslate-backend-sa
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: docr-secret
          containers:
          - name: cleanup
            image: registry.digitalocean.com/tesslate-container-registry-nyc3/tesslate-backend:latest
            imagePullPolicy: Always
            command: ["python", "-c"]
            args:
              - |
                import asyncio
                import sys
                sys.path.append('/app')

                from app.k8s_container_manager import KubernetesContainerManager
                from app.config import get_settings
                import logging

                logging.basicConfig(level=logging.INFO)
                logger = logging.getLogger(__name__)

                async def cleanup_idle_environments():
                    """Clean up idle development environments using two-tier cleanup."""
                    try:
                        settings = get_settings()
                        logger.info("Starting idle environment cleanup...")
                        logger.info(f"Storage mode: {'S3-backed (hibernation)' if settings.k8s_use_s3_storage else 'Persistent PVC (two-tier)'}")

                        # Initialize the Kubernetes container manager
                        container_manager = KubernetesContainerManager()

                        # Use configured cleanup intervals from settings
                        idle_timeout = settings.container_cleanup_tier1_idle_minutes

                        # Run cleanup (handles both S3 and persistent modes)
                        cleaned = await container_manager.cleanup_idle_environments(
                            idle_timeout_minutes=idle_timeout
                        )

                        logger.info(f"Cleanup completed. Processed {len(cleaned)} environments")

                        if cleaned:
                            for env in cleaned:
                                logger.info(f"  - Cleaned: {env}")

                    except Exception as e:
                        logger.error(f"Cleanup error: {e}", exc_info=True)
                        sys.exit(1)

                # Run the cleanup
                asyncio.run(cleanup_idle_environments())
            env:
              - name: KUBERNETES_NAMESPACE
                value: tesslate
              - name: DEPLOYMENT_MODE
                value: "kubernetes"
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: DATABASE_URL
              - name: SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: SECRET_KEY
              - name: POSTGRES_HOST
                value: "postgres"
              - name: POSTGRES_PORT
                value: "5432"
              - name: POSTGRES_DB
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_DB
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_USER
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_PASSWORD
              # Kubernetes configuration
              - name: K8S_USE_S3_STORAGE
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: K8S_USE_S3_STORAGE
                    optional: true
              - name: K8S_NAMESPACE_PER_PROJECT
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: K8S_NAMESPACE_PER_PROJECT
                    optional: true
              - name: K8S_DEVSERVER_IMAGE
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: K8S_DEVSERVER_IMAGE
                    optional: true
              - name: K8S_IMAGE_PULL_SECRET
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: K8S_IMAGE_PULL_SECRET
                    optional: true
              - name: K8S_DEFAULT_NAMESPACE
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: K8S_DEFAULT_NAMESPACE
                    optional: true
              - name: CONTAINER_CLEANUP_TIER1_IDLE_MINUTES
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: CONTAINER_CLEANUP_TIER1_IDLE_MINUTES
                    optional: true
              - name: APP_DOMAIN
                valueFrom:
                  secretKeyRef:
                    name: tesslate-app-secrets
                    key: APP_DOMAIN
                    optional: true
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
