---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tesslate-backend-role
  namespace: tesslate-user-environments
rules:
  # Allow backend to list, get, and watch pods in user environments namespace
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Allow backend to execute commands in pods (kubectl exec)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]

  # Allow backend to read pod logs (for debugging)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

  # Allow backend to manage deployments, services, ingresses
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tesslate-backend-role-main
  namespace: tesslate
rules:
  # Allow backend to manage its own namespace resources
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
