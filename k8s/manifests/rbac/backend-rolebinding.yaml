---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tesslate-backend-rolebinding
  namespace: tesslate-user-environments
subjects:
  - kind: ServiceAccount
    name: tesslate-backend-sa  # Backend pods run under tesslate-backend-sa service account
    namespace: tesslate
roleRef:
  kind: Role
  name: tesslate-backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tesslate-backend-rolebinding-main
  namespace: tesslate
subjects:
  - kind: ServiceAccount
    name: tesslate-backend-sa
    namespace: tesslate
roleRef:
  kind: Role
  name: tesslate-backend-role-main
  apiGroup: rbac.authorization.k8s.io
