# RBAC Configuration for Development Environment Management
# Grants the backend service the permissions required to manage
# Kubernetes resources for user development environments across all namespaces
#
# This includes:
# - Namespace-per-project isolation (create/delete namespaces)
# - NetworkPolicy creation for project isolation
# - PVC management for project storage
# - Deployment/Service/Ingress for dev containers
# - Pod exec for file operations and shell sessions

---
# Service Account for the backend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tesslate-backend-sa
  namespace: tesslate
  labels:
    app: tesslate-backend
    component: rbac
---
# ClusterRole defining the permissions needed for dev environment management
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tesslate-dev-environments-manager
  labels:
    app: tesslate-backend
    component: rbac
rules:
# ====== NAMESPACE MANAGEMENT (for namespace-per-project isolation) ======
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

# ====== CORE RESOURCES (pods, services, PVCs, secrets, configmaps) ======
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - pods/exec
    - services
    - persistentvolumeclaims
    - secrets
    - configmaps
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

# ====== APP RESOURCES (deployments, replicasets, statefulsets) ======
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

# ====== NETWORKING (ingresses, networkpolicies) ======
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

# ====== BATCH RESOURCES (for future build pipeline/jobs) ======
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

# ====== EVENTS (for troubleshooting and monitoring) ======
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding - grants cluster-wide permissions to the backend service account
# This allows the backend to manage resources in any namespace (required for namespace-per-project)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tesslate-backend-cluster-access
  labels:
    app: tesslate-backend
    component: rbac
subjects:
- kind: ServiceAccount
  name: tesslate-backend-sa
  namespace: tesslate
roleRef:
  kind: ClusterRole
  name: tesslate-dev-environments-manager
  apiGroup: rbac.authorization.k8s.io