# RBAC Configuration for Project Namespace Management
#
# This ClusterRole and ClusterRoleBinding grant the Orchestrator service account
# permissions to create and manage project namespaces and resources within them.
#
# Apply with: kubectl apply -f k8s/manifests/security/project-namespace-rbac.yaml

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tesslate-project-manager
  labels:
    app: tesslate
    component: orchestrator
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

  # Core resources within project namespaces
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - services
      - persistentvolumeclaims
      - secrets
      - configmaps
    verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

  # App resources within project namespaces
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

  # Networking resources within project namespaces
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

  # Batch resources (for build jobs)
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tesslate-project-manager-binding
  labels:
    app: tesslate
    component: orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tesslate-project-manager
subjects:
  # Bind to orchestrator service account in tesslate namespace
  - kind: ServiceAccount
    name: tesslate-orchestrator
    namespace: tesslate

---
# Service Account for Orchestrator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tesslate-orchestrator
  namespace: tesslate
  labels:
    app: tesslate
    component: orchestrator
