# Set DEPLOYMENT_ENV for feature flag overlay selection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-backend
  namespace: tesslate
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: DEPLOYMENT_ENV
              value: "production"
            # Use the standalone opensail-runtime pod (added by the 2026-04
            # automation runtime) for connector-proxy traffic instead of the
            # embedded in-process router. Keeps the proxy on its own
            # NetworkPolicy and frees the orchestrator from connector load.
            - name: CONNECTOR_PROXY_MODE
              value: "dedicated"
---
# Marketplace pod — flip OPENSAIL_ENV to prod, replace the dev-flavoured
# HUB_DISPLAY_NAME from the base manifest, and disable on-startup seed
# loading so a pod restart never re-seeds the live catalog. Bundle
# storage stays on the 5Gi PVC for now; S3 backend requires adding boto3
# to packages/tesslate-marketplace/pyproject.toml (follow-up).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-marketplace
  namespace: tesslate
spec:
  template:
    spec:
      containers:
        - name: marketplace
          env:
            - name: OPENSAIL_ENV
              value: "prod"
            - name: HUB_DISPLAY_NAME
              value: "Tesslate Official"
            - name: MARKETPLACE_LOAD_SEEDS_ON_STARTUP
              value: "false"
      initContainers:
        # Keep alembic-migrate's OPENSAIL_ENV in sync with the runtime
        # container so any alembic env() reads pick the same code path.
        - name: alembic-migrate
          env:
            - name: OPENSAIL_ENV
              value: "prod"
