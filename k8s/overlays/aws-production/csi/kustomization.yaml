# AWS EKS Production Overlay for btrfs CSI Driver
# Deploy with: ./scripts/aws-deploy.sh deploy-csi production
# SA + config Secret are created by terraform (kubernetes.tf) — not kustomize
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../services/btrfs-csi/deploy

images:
  - name: tesslate-btrfs-csi
    newName: <ECR_REGISTRY>/tesslate-btrfs-csi
    newTag: production
