# =============================================================================
# Azure Disk StorageClass
# =============================================================================
# Maps the abstract 'tesslate-block-storage' class to Azure Premium SSD.
# Used for non-template project PVCs. Once the btrfs CSI driver fully
# replaces Azure Disk provisioning, this file can be removed.
#
# Premium_LRS chosen over Standard_LRS to match the perf profile of AWS
# gp3 (the aws-base equivalent). Switch to StandardSSD_LRS for cost
# savings if local-disk IOPS aren't critical for the workload.
# =============================================================================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: tesslate-block-storage
  labels:
    app.kubernetes.io/name: tesslate
    app.kubernetes.io/component: storage
provisioner: disk.csi.azure.com
parameters:
  skuName: Premium_LRS
  cachingMode: ReadOnly
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
