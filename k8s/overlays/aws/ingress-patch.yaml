# =============================================================================
# AWS EKS Ingress Patch
# =============================================================================
# Production ingress configuration with:
# - AWS ALB Ingress Controller (or NGINX Ingress)
# - ACM certificate for TLS
# - WAF integration (optional)
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tesslate-main-ingress
  annotations:
    # Use NGINX Ingress (recommended for WebSocket support)
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;

    # OR use ALB Ingress Controller:
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/certificate-arn: <ACM-CERT-ARN>
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/wafv2-acl-arn: <WAF-ACL-ARN>

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - tesslate.example.com
        - "*.tesslate.example.com"
      secretName: tesslate-wildcard-tls
  rules:
    - host: tesslate.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tesslate-backend-service
                port:
                  number: 8005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tesslate-frontend-service
                port:
                  number: 80
