# AWS EKS Backend Deployment Patch for your-domain.com
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-backend
  namespace: tesslate
spec:
  replicas: 1  # Single replica required - tasks stored in-memory
  template:
    spec:
      serviceAccountName: tesslate-backend-sa
      containers:
        - name: backend
          imagePullPolicy: Always
          env:
            # Replace all env vars with AWS-specific config
            - $patch: replace
            # Core settings
            - name: DEPLOYMENT_MODE
              value: "kubernetes"
            - name: KUBERNETES_NAMESPACE
              value: "tesslate"
            # Database
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: DATABASE_URL
            # Security
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SECRET_KEY
            # LiteLLM
            - name: LITELLM_API_BASE
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: LITELLM_API_BASE
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_DEFAULT_MODELS
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: LITELLM_DEFAULT_MODELS
            # JWT
            - name: ALGORITHM
              value: "HS256"
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            # Domain - AWS specific
            - name: APP_DOMAIN
              value: "your-domain.com"
            - name: APP_BASE_URL
              value: "https://your-domain.com"
            - name: DEV_SERVER_BASE_URL
              value: "https://*.your-domain.com"
            - name: CORS_ORIGINS
              value: "https://your-domain.com,https://*.your-domain.com"
            - name: ALLOWED_HOSTS
              value: "your-domain.com,*.your-domain.com"
            # Kubernetes settings
            - name: K8S_NAMESPACE_PER_PROJECT
              value: "true"
            - name: K8S_ENABLE_NETWORK_POLICIES
              value: "true"
            - name: K8S_STORAGE_CLASS
              value: "tesslate-block-storage"
            - name: K8S_PVC_SIZE
              value: "5Gi"
            - name: K8S_INGRESS_CLASS
              value: "nginx"
            - name: K8S_INGRESS_DOMAIN
              value: "your-domain.com"
            - name: K8S_DEVSERVER_IMAGE
              value: "<ECR_REGISTRY>/tesslate-devserver:latest"
            - name: K8S_REGISTRY_URL
              value: "<ECR_REGISTRY>"
            - name: K8S_IMAGE_PULL_SECRET
              value: ""
            - name: K8S_IMAGE_PULL_POLICY
              value: "Always"
            - name: K8S_WILDCARD_TLS_SECRET
              value: "tesslate-wildcard-tls"
            # S3 - AWS native (IRSA handles auth)
            - name: S3_ENDPOINT_URL
              value: ""
            - name: S3_BUCKET_NAME
              value: "tesslate-projects-production-7761157a"
            - name: S3_REGION
              value: "us-east-1"
            # Pod Affinity
            - name: K8S_ENABLE_POD_AFFINITY
              value: "true"
            - name: K8S_AFFINITY_TOPOLOGY_KEY
              value: "topology.kubernetes.io/zone"
            # Hibernation
            - name: K8S_HIBERNATION_IDLE_MINUTES
              value: "30"
            - name: K8S_HIBERNATION_GRACE_SECONDS
              value: "120"
            - name: K8S_DEHYDRATION_EXCLUDE_PATTERNS
              value: "node_modules,.git,__pycache__,venv,.venv"
            # SMTP (Email / 2FA)
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_USE_TLS
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SMTP_USE_TLS
            - name: SMTP_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: SMTP_SENDER_EMAIL
            - name: TWO_FA_ENABLED
              valueFrom:
                secretKeyRef:
                  name: tesslate-app-secrets
                  key: TWO_FA_ENABLED
                  optional: true
            # Cookies
            - name: COOKIE_SECURE
              value: "true"
            - name: COOKIE_SAMESITE
              value: "lax"
            - name: COOKIE_DOMAIN
              value: ".your-domain.com"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
