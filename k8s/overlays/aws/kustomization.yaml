# AWS EKS Overlay for your-domain.com
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tesslate

resources:
  - ../../base
  - storage-class.yaml

# Patch backend and replace ingress
patchesStrategicMerge:
  - backend-patch.yaml
  - ingress-patch.yaml

images:
  - name: tesslate-backend
    newName: <ECR_REGISTRY>/tesslate-backend
    newTag: latest
  - name: tesslate-frontend
    newName: <ECR_REGISTRY>/tesslate-frontend
    newTag: latest
  - name: tesslate-devserver
    newName: <ECR_REGISTRY>/tesslate-devserver
    newTag: latest

configMapGenerator:
  - name: tesslate-config
    behavior: merge
    literals:
      - DEPLOYMENT_MODE=kubernetes
      - K8S_NAMESPACE_PER_PROJECT=true
      - K8S_ENABLE_NETWORK_POLICIES=true
      - K8S_STORAGE_CLASS=tesslate-block-storage
      - K8S_INGRESS_CLASS=nginx
      - K8S_INGRESS_DOMAIN=your-domain.com
      - devserver_image=<ECR_REGISTRY>/tesslate-devserver:latest
      - registry_url=<ECR_REGISTRY>
      - s3_bucket_name=tesslate-projects-production-7761157a
      - aws_region=us-east-1

labels:
  - pairs:
      cloud-provider: aws
      environment: production
      domain: your-domain.com
    includeSelectors: false
