# Set DEPLOYMENT_ENV for feature flag overlay selection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-backend
  namespace: tesslate
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: DEPLOYMENT_ENV
              value: "production"
            - name: CONNECTOR_PROXY_MODE
              value: "dedicated"
---
# Marketplace pod — flip OPENSAIL_ENV to prod, replace the dev-flavoured
# HUB_DISPLAY_NAME from the base manifest, and disable on-startup seed
# loading so a pod restart never re-seeds the live catalog.
#
# Bundle storage backend: INHERITS the base default `BUNDLE_STORAGE_BACKEND
# = local` — bundles land on the marketplace-data PVC at /data/bundles.
# Unlike AWS (where boto3 + IRSA against real S3 works), Azure Blob is not
# S3-protocol compatible AND boto3 doesn't understand Azure Workload
# Identity, so the AWS pattern (s3 backend + IRSA-shaped creds) cannot
# work here. Local-PVC matches what minikube does.
#
# Production-grade durability for bundles on Azure would need either a
# code-side migration to azure-storage-blob, an in-cluster MinIO with
# Premium SSD PVCs, or a sidecar that syncs /data/bundles to an Azure
# Blob container. Tracked separately; the PVC is sufficient for beta and
# the prod-but-not-yet-load-bearing case.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-marketplace
  namespace: tesslate
spec:
  template:
    spec:
      containers:
        - name: marketplace
          env:
            - name: OPENSAIL_ENV
              value: "prod"
            - name: HUB_DISPLAY_NAME
              value: "Tesslate Official"
            - name: MARKETPLACE_LOAD_SEEDS_ON_STARTUP
              value: "false"
      initContainers:
        - name: create-database
        - name: alembic-migrate
          env:
            - name: OPENSAIL_ENV
              value: "prod"
