# AWS EKS Beta Overlay
# Deploy with: kubectl apply -k k8s/overlays/aws-beta
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../aws-base

patches:
  - path: replicas-patch.yaml
  - path: env-patch.yaml

images:
  - name: tesslate-backend
    newName: <ECR_REGISTRY>/tesslate-backend
    newTag: beta
  - name: tesslate-frontend
    newName: <ECR_REGISTRY>/tesslate-frontend
    newTag: beta
  - name: tesslate-devserver
    newName: <ECR_REGISTRY>/tesslate-devserver
    newTag: beta
  - name: tesslate-ast
    newName: <ECR_REGISTRY>/tesslate-ast
    newTag: beta
  - name: tesslate-marketplace
    newName: <ECR_REGISTRY>/tesslate-marketplace
    newTag: beta

labels:
  - pairs:
      environment: beta
    includeSelectors: false
