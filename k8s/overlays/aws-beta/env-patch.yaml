# Set DEPLOYMENT_ENV for feature flag overlay selection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-backend
  namespace: tesslate
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: DEPLOYMENT_ENV
              value: "beta"
            # Use the standalone opensail-runtime pod (added by the 2026-04
            # automation runtime) for connector-proxy traffic instead of the
            # embedded in-process router.
            - name: CONNECTOR_PROXY_MODE
              value: "dedicated"
---
# Marketplace pod — beta uses a staging-like OPENSAIL_ENV, disables
# on-startup seed loading so a pod restart never re-seeds the live
# catalog, and uses S3 for bundle storage (matches production so the
# behaviour we test in beta is the same we ship). Beta's DATABASE_URL
# still points at the in-cluster postgres pod (terraform branches on
# var.create_rds=false in marketplace-secret).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-marketplace
  namespace: tesslate
spec:
  template:
    spec:
      containers:
        - name: marketplace
          env:
            - name: OPENSAIL_ENV
              value: "staging"
            - name: HUB_DISPLAY_NAME
              value: "Tesslate Beta"
            - name: MARKETPLACE_LOAD_SEEDS_ON_STARTUP
              value: "false"
            - name: BUNDLE_STORAGE_BACKEND
              value: "s3"
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: marketplace-secret
                  key: S3_BUCKET
            - name: S3_REGION
              value: "us-east-1"
      initContainers:
        # IMPORTANT: list both initContainers here in the desired execution
        # order. Kustomize's strategic merge of initContainers reorders by
        # the patch sequence — if we only mention `alembic-migrate`,
        # `create-database` ends up after it and never runs (alembic fails
        # on missing DB). create-database must run first.
        - name: create-database
        - name: alembic-migrate
          env:
            - name: OPENSAIL_ENV
              value: "staging"
