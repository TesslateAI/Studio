# PostgreSQL Credentials for Minikube
# Copy this file to postgres-secret.yaml and fill in your values
# DO NOT commit postgres-secret.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: tesslate
type: Opaque
stringData:
  POSTGRES_DB: "tesslate_dev"
  POSTGRES_USER: "tesslate_user"
  # Local-dev password. This single value MUST match the tesslate_user
  # password embedded in the connection URLs of the other two secrets that
  # talk to this same Postgres:
  #   - app-secrets.yaml      → DATABASE_URL
  #   - marketplace-secret.yaml → DATABASE_URL and ADMIN_DATABASE_URL
  # If they drift, that service fails with "password authentication failed".
  POSTGRES_PASSWORD: "dev_password_change_me"
