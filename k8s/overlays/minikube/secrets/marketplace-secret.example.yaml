# Marketplace Service Credentials for Minikube
# Copy this file to marketplace-secret.yaml and fill in your values.
# DO NOT commit marketplace-secret.yaml to git!
#
# DATABASE_URL points at the in-cluster postgres pod (separate
# `tesslate_marketplace` database from the orchestrator's `tesslate_dev`).
#
# BUNDLE_URL_SECRET signs bundle redirect URLs (HMAC). Random per-deploy.
#
# STATIC_TOKENS grants admin governance scopes to the orchestrator.
# Format: token1:scope1:scope2,token2:scope3
# The orchestrator's MARKETPLACE_ADMIN_TOKEN env var must match one of
# these tokens that has the admin.write scope.

apiVersion: v1
kind: Secret
metadata:
  name: marketplace-secret
  namespace: tesslate
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://tesslate_user:dev_password_change_me@postgres:5432/tesslate_marketplace"
  # ADMIN_DATABASE_URL is consumed by the create-database initContainer —
  # plain libpq URL pointed at the maintenance database (`postgres`) on
  # the same instance, so it can run CREATE DATABASE if tesslate_marketplace
  # doesn't exist yet.
  ADMIN_DATABASE_URL: "postgresql://tesslate_user:dev_password_change_me@postgres:5432/postgres"
  BUNDLE_URL_SECRET: "dev-bundle-secret-change-me"
  STATIC_TOKENS: "dev-orchestrator-admin:admin.write:publish:yanks.write:catalog.write:pricing.write"
