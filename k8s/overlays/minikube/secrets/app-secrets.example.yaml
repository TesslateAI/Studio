# Application Secrets for Minikube
# Copy this file to app-secrets.yaml and fill in your values
# DO NOT commit app-secrets.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: tesslate-app-secrets
  namespace: tesslate
type: Opaque
stringData:
  # Core settings
  SECRET_KEY: "generate-a-random-64-char-hex-string"
  DATABASE_URL: "postgresql+asyncpg://tesslate_user:your_password@postgres:5432/tesslate_dev"

  # Internal API shared secret (authenticates Hub GC and btrfs CSI calls to /api/internal/*)
  # Must match ORCHESTRATOR_INTERNAL_SECRET in the btrfs-csi-config secret.
  # Generate: python -c "import secrets; print(secrets.token_hex(32))"
  INTERNAL_API_SECRET: "dev-secret-changeme"

  # LiteLLM Configuration
  LITELLM_API_BASE: "https://your-litellm-instance.com/v1"
  LITELLM_MASTER_KEY: "your-litellm-master-key"
  LITELLM_DEFAULT_MODELS: "claude-sonnet-4.6,claude-opus-4.6"
  LITELLM_TEAM_ID: "default"
  LITELLM_EMAIL_DOMAIN: "localhost"
  LITELLM_INITIAL_BUDGET: "10000.0"

  # Domain settings
  # For CF tunnel access, set APP_DOMAIN to your tunnel domain (e.g., studio.yourdomain.com)
  # Localhost is always allowed by the CORS middleware regardless of this value
  APP_DOMAIN: "localhost"
  APP_BASE_URL: "http://localhost"
  DEV_SERVER_BASE_URL: "http://localhost"
  CORS_ORIGINS: "http://localhost"
  ALLOWED_HOSTS: "localhost"

  # Cookie settings
  # Leave COOKIE_DOMAIN empty for multi-domain support (localhost + CF tunnel)
  COOKIE_SECURE: "false"
  COOKIE_SAMESITE: "lax"
  COOKIE_DOMAIN: ""

  # Deployment mode
  DEPLOYMENT_MODE: "kubernetes"

  # OAuth Configuration (get from Google/GitHub developer console)
  GOOGLE_CLIENT_ID: "your-google-client-id.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  GOOGLE_OAUTH_REDIRECT_URI: "http://localhost/api/auth/google/callback"
  GITHUB_CLIENT_ID: "your-github-client-id"
  GITHUB_CLIENT_SECRET: "your-github-client-secret"
  GITHUB_OAUTH_REDIRECT_URI: "http://localhost/api/auth/github/callback"

  # Stripe Configuration (get from Stripe Dashboard)
  STRIPE_SECRET_KEY: "sk_test_your_stripe_secret_key"
  STRIPE_PUBLISHABLE_KEY: "pk_test_your_stripe_publishable_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret"
  STRIPE_CONNECT_CLIENT_ID: ""

  # Stripe Per-Tier Price IDs (monthly)
  STRIPE_BASIC_PRICE_ID: "price_your_basic_monthly_id"
  STRIPE_PRO_PRICE_ID: "price_your_pro_monthly_id"
  STRIPE_ULTRA_PRICE_ID: "price_your_ultra_monthly_id"

  # Stripe Per-Tier Price IDs (annual)
  STRIPE_BASIC_ANNUAL_PRICE_ID: "price_your_basic_annual_id"
  STRIPE_PRO_ANNUAL_PRICE_ID: "price_your_pro_annual_id"
  STRIPE_ULTRA_ANNUAL_PRICE_ID: "price_your_ultra_annual_id"

  # SMTP Configuration (for 2FA email codes - optional)
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_USE_TLS: "true"
  SMTP_SENDER_EMAIL: ""
  TWO_FA_ENABLED: "false"

  # GitLab OAuth Configuration (for repository import - optional)
  GITLAB_CLIENT_ID: ""
  GITLAB_CLIENT_SECRET: ""
  GITLAB_OAUTH_REDIRECT_URI: "http://localhost/api/git-providers/gitlab/oauth/callback"

  # Bitbucket OAuth Configuration (for repository import - optional)
  BITBUCKET_CLIENT_ID: ""
  BITBUCKET_CLIENT_SECRET: ""
  BITBUCKET_OAUTH_REDIRECT_URI: "http://localhost/api/git-providers/bitbucket/oauth/callback"

  # GitHub Token Encryption Key (base64 Fernet key - optional, defaults to SECRET_KEY)
  GITHUB_TOKEN_ENCRYPTION_KEY: ""

  # OAuth enabled flags
  GOOGLE_OAUTH_ENABLED: "false"
  GITHUB_OAUTH_ENABLED: "false"

  # Deployment Credential Encryption Key (base64 Fernet key - optional, defaults to SECRET_KEY)
  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  DEPLOYMENT_ENCRYPTION_KEY: ""

  # Deployment Provider OAuth Configuration
  # Vercel OAuth (for deployments - optional)
  VERCEL_CLIENT_ID: ""
  VERCEL_CLIENT_SECRET: ""
  VERCEL_OAUTH_REDIRECT_URI: "http://localhost/api/deployment-oauth/vercel/callback"

  # Netlify OAuth (for deployments - optional)
  NETLIFY_CLIENT_ID: ""
  NETLIFY_CLIENT_SECRET: ""
  NETLIFY_OAUTH_REDIRECT_URI: "http://localhost/api/deployment-oauth/netlify/callback"

  # Heroku OAuth (for deployments - optional)
  HEROKU_CLIENT_ID: ""
  HEROKU_CLIENT_SECRET: ""
  HEROKU_OAUTH_REDIRECT_URI: "http://localhost/api/deployment-oauth/heroku/callback"

  # DigitalOcean OAuth (for deployments - optional)
  DIGITALOCEAN_CLIENT_ID: ""
  DIGITALOCEAN_CLIENT_SECRET: ""
  DIGITALOCEAN_OAUTH_REDIRECT_URI: "http://localhost/api/deployment-oauth/digitalocean/callback"

  # MCP Connector OAuth Apps (optional - for platform_app registration method)
  # Some MCP servers (GitHub Copilot MCP, Slack) require a pre-registered OAuth
  # app. Register at the provider, set callback to http://localhost/api/mcp/oauth/callback
  MCP_OAUTH_APP_GITHUB_CLIENT_ID: ""
  MCP_OAUTH_APP_GITHUB_CLIENT_SECRET: ""
  MCP_OAUTH_APP_SLACK_CLIENT_ID: ""
  MCP_OAUTH_APP_SLACK_CLIENT_SECRET: ""

  # Web Search Configuration (optional - for agent web search tool)
  TAVILY_API_KEY: ""
  BRAVE_SEARCH_API_KEY: ""

  # PostHog Analytics (optional - leave empty to disable)
  # Used by frontend for user analytics and feature flags
  POSTHOG_KEY: ""  # e.g., "phc_your_posthog_project_key"
  # Note: POSTHOG_HOST is set in frontend-config.yaml (not here)
