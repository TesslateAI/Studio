# Backend Patches for Minikube
# Configures backend for local development
# Note: Domain settings, CORS, S3 etc are in secrets which have local values

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesslate-backend
  namespace: tesslate
spec:
  replicas: 1  # Single replica for local dev
  template:
    spec:
      # No image pull secrets needed for local images
      imagePullSecrets: []
      containers:
      - name: backend
        imagePullPolicy: Never  # Use locally built image
        env:
          - name: DEPLOYMENT_ENV
            value: "minikube"
          # Override devserver image to use local build (same tag as production)
          - name: K8S_DEVSERVER_IMAGE
            value: "tesslate-devserver:latest"
          # Override image pull secret (empty for local)
          - name: K8S_IMAGE_PULL_SECRET
            value: ""
          # Use Never for local images (critical for :latest tag to work locally)
          - name: K8S_IMAGE_PULL_POLICY
            value: "Never"
          # No TLS for local dev (use http:// instead of https://)
          - name: K8S_WILDCARD_TLS_SECRET
            value: ""
          # Mount the test-helpers router (magic-link inbox) for Playwright E2E.
          # Harmless on minikube; the helpers only mount when this env is set.
          # NEVER set this in beta/prod overlays.
          - name: TEST_HELPERS_ENABLED
            value: "1"
          # Auto-approve published app versions on minikube so seeded apps land
          # public immediately. The HTTPS guard in config.py blocks this in prod.
          - name: TSL_APPS_DEV_AUTO_APPROVE
            value: "1"
          # Federated marketplace (Wave 10): point Tesslate Official's
          # base_url at the in-cluster marketplace pod. The seed worker
          # refreshes this on every boot so an env flip is enough to
          # repoint reads — no manual SQL UPDATE needed.
          - name: TESSLATE_OFFICIAL_BASE_URL
            value: "http://tesslate-marketplace:8800"
          # Wave 8 admin governance writes (publish, yank, force-approve,
          # override-yank). MUST match a STATIC_TOKENS entry in the
          # marketplace pod's secret with the admin.write scope.
          - name: MARKETPLACE_ADMIN_TOKEN
            value: "dev-orchestrator-admin"
          # Wave 8 state-change webhook (marketplace -> orchestrator). HMAC
          # secret keyed on (secret + ":" + hub_id, raw_body). Same value
          # must be configured on the marketplace side per source.
          - name: MARKETPLACE_SUBMISSION_WEBHOOK_SECRET
            value: "dev-submission-webhook-secret"
          # Wave 9 entitlement-grant webhook (hub -> orchestrator) for
          # admin_trusted Stripe Connect. Off by default in dev (the
          # global flag is false), but the secret is still required so
          # the endpoint can validate signatures.
          - name: MARKETPLACE_HUB_ENTITLEMENT_SECRET
            value: "dev-entitlement-secret"
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "1"
