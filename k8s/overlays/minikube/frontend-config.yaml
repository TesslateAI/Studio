# Frontend ConfigMap for Minikube
# For AWS environments, this is managed by Terraform (kubernetes.tf)
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: tesslate
data:
  # Empty = relative URLs (works from any origin: localhost, CF tunnel, etc.)
  api-url: ""
  # PostHog host (same for all environments)
  posthog-host: "https://app.posthog.com"
