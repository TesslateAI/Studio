# Cloudflare Tunnel Credentials for Minikube
# Copy this file to credentials.yaml and fill in your tunnel token.
# DO NOT commit credentials.yaml to git!
#
# To get a tunnel token:
#   1. Go to https://one.dash.cloudflare.com
#   2. Navigate to Networks → Tunnels
#   3. Create a tunnel (or use an existing one)
#   4. Copy the token from the "Install connector" step
#
# Then configure the public hostname in the tunnel settings:
#   - Type: HTTP
#   - URL: ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
#   - HTTP Host Header: localhost

apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-credentials
  namespace: cloudflare-tunnel
type: Opaque
stringData:
  TUNNEL_TOKEN: "your-tunnel-token-here"
