# MinIO Credentials for Minikube
# Copy this file to credentials.yaml and fill in your values
# DO NOT commit credentials.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio-system
type: Opaque
stringData:
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "change-me-to-a-secure-password"
