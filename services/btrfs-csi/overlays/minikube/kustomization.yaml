apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay on the base CSI deploy + Volume Hub for minikube
resources:
  - ../../deploy
  - ../../../../k8s/base/volume-hub

namespace: kube-system

patches:
  # Node DaemonSet: local image, imagePullPolicy, reduce pool size for minikube
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: tesslate-btrfs-csi-node
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: "Never"
      - op: add
        path: /spec/template/spec/initContainers/0/imagePullPolicy
        value: "Never"
      - op: replace
        path: /spec/template/spec/initContainers/0/env/0/value
        value: "10"

  # Volume Hub: local image, imagePullPolicy
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: tesslate-volume-hub
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: "Never"

  # Image precache: swap devserver for pause (devserver loaded separately)
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: tesslate-image-precache
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: "registry.k8s.io/pause:3.10"
      - op: add
        path: /spec/template/spec/initContainers/0/imagePullPolicy
        value: "IfNotPresent"
