# btrfs-CSI credentials for minikube (uses MinIO for S3).
# Copy to csi-credentials.yaml and adjust values if needed.
# On AWS this secret is managed by Terraform (kubernetes.tf).
apiVersion: v1
kind: Secret
metadata:
  name: tesslate-btrfs-csi-config
  namespace: kube-system
type: Opaque
stringData:
  STORAGE_PROVIDER: "s3"
  STORAGE_BUCKET: "tesslate-btrfs-snapshots"
  RCLONE_S3_PROVIDER: "Minio"
  RCLONE_S3_ENDPOINT: "http://minio.minio-system.svc:9000"
  RCLONE_S3_ACCESS_KEY_ID: "minioadmin"
  RCLONE_S3_SECRET_ACCESS_KEY: "change-me-to-a-secure-password"
  RCLONE_S3_ENV_AUTH: "false"
  RCLONE_S3_NO_CHECK_BUCKET: "true"
  RCLONE_S3_FORCE_PATH_STYLE: "true"
  RCLONE_S3_REGION: "us-east-1"
  SYNC_INTERVAL: "60"
  POOL_PATH: "/mnt/tesslate-pool"
