apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources:
  - rbac/node-rbac.yaml
  - manifests/csi-driver.yaml
  - manifests/storage-class.yaml
  - manifests/snapshot-class.yaml
  # config-secret is managed per-environment:
  #   AWS: Terraform creates it with S3 bucket + rclone config (kubernetes.tf)
  #   Minikube: minikube overlay creates it with local/empty values
  - manifests/node.yaml
  - manifests/node-service.yaml
  - manifests/network-policy.yaml
  - manifests/image-precache.yaml
