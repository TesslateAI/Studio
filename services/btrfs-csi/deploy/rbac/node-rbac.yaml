# ServiceAccount is NOT created here — it is managed per-environment:
#   AWS (production/beta): Terraform creates it with IRSA annotation (kubernetes.tf)
#   Minikube: minikube overlay creates it without IRSA
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tesslate-btrfs-csi-node
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tesslate-btrfs-csi-node
subjects:
  - kind: ServiceAccount
    name: tesslate-btrfs-csi-node
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: tesslate-btrfs-csi-node
  apiGroup: rbac.authorization.k8s.io
