apiVersion: v1
kind: Secret
metadata:
  name: tesslate-btrfs-csi-config
type: Opaque
stringData:
  STORAGE_PROVIDER: "s3"
  STORAGE_BUCKET: "tesslate-btrfs-snapshots"
  RCLONE_S3_PROVIDER: "AWS"
  RCLONE_S3_REGION: "us-east-1"
  RCLONE_S3_ACCESS_KEY_ID: "REPLACE_ME"
  RCLONE_S3_SECRET_ACCESS_KEY: "REPLACE_ME"
  SYNC_INTERVAL: "60"
  POOL_PATH: "/mnt/tesslate-pool"
