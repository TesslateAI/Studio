apiVersion: v1
kind: Secret
metadata:
  name: tesslate-btrfs-csi-config
type: Opaque
stringData:
  STORAGE_PROVIDER: "s3"
  # Bucket name from: terraform output btrfs_snapshots_bucket_name
  STORAGE_BUCKET: "REPLACE_WITH_TERRAFORM_OUTPUT"
  RCLONE_S3_PROVIDER: "AWS"
  RCLONE_S3_REGION: "us-east-1"
  # When using IRSA (recommended), rclone picks up credentials from the
  # pod's projected service account token automatically — leave these empty.
  # Only set explicit keys for non-IRSA setups (e.g., minikube).
  RCLONE_S3_ACCESS_KEY_ID: ""
  RCLONE_S3_SECRET_ACCESS_KEY: ""
  RCLONE_S3_ENV_AUTH: "true"
  SYNC_INTERVAL: "60"
  POOL_PATH: "/mnt/tesslate-pool"
