apiVersion: v1
kind: Secret
metadata:
  name: tesslate-btrfs-csi-config
type: Opaque
stringData:
  # Default empty values — overridden by environment overlays.
  # AWS: Terraform creates this secret with real S3 credentials.
  # Minikube: Integration test overlay patches with empty values.
  S3_ENDPOINT: ""
  S3_BUCKET: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_REGION: ""
  SYNC_INTERVAL: "0"
  POOL_PATH: "/mnt/tesslate-pool"
