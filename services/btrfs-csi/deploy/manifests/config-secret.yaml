apiVersion: v1
kind: Secret
metadata:
  name: tesslate-btrfs-csi-config
type: Opaque
stringData:
  S3_ENDPOINT: "s3.amazonaws.com"
  S3_BUCKET: "tesslate-btrfs-snapshots"
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
  S3_REGION: "us-east-1"
  SYNC_INTERVAL: "60"
  POOL_PATH: "/mnt/tesslate-pool"
