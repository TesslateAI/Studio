apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tesslate-btrfs-csi-node-restrict
spec:
  podSelector:
    matchLabels:
      app: tesslate-btrfs-csi-node
  policyTypes:
    - Ingress
  ingress:
    # Allow nodeops gRPC (port 9741) only from tesslate backend pods.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tesslate
          podSelector:
            matchLabels:
              app: tesslate-backend
      ports:
        - protocol: TCP
          port: 9741
    # Allow CSI node registration from kubelet (runs on the host network).
    - from: []
      ports:
        - protocol: TCP
          port: 9742
