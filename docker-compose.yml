# LOCAL DEVELOPMENT ONLY - Traefik for *.localhost routing
# Production uses NGINX Ingress Controller in Kubernetes
# See k8s/manifests/app/08-ingress.yaml for production routing

services:
  traefik:
    image: traefik:v3.1
    container_name: tesslate-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tesslate-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=dev@localhost"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--log.level=INFO"

  orchestrator:
    build: ./orchestrator
    container_name: tesslate-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./orchestrator:/app
      - ./orchestrator/users:/app/users
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./orchestrator.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEPLOYMENT_MODE=docker
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-your-domain.com,studio-test.tesslate.com,studio-demo.tesslate.com,localhost,*.localhost}
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`api.localhost`)"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8000"

  app:
    build: ./app
    container_name: tesslate-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=
      - VITE_ALLOWED_HOSTS=${ALLOWED_HOSTS:-your-domain.com,studio-test.tesslate.com,studio-demo.tesslate.com,localhost,host.docker.internal,.localhost}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`studio.localhost`)"
      - "traefik.http.services.app.loadbalancer.server.port=5173"

networks:
  tesslate-network:
    name: tesslate-network
    driver: bridge