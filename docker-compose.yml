# LOCAL DEVELOPMENT ONLY - Traefik for *.localhost routing
# Production uses NGINX Ingress Controller in Kubernetes
# See k8s/manifests/app/08-ingress.yaml for production routing

services:
  traefik:
    image: traefik:v3.1
    container_name: tesslate-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tesslate-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=dev@localhost"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--log.level=INFO"

  orchestrator:
    build: ./orchestrator
    container_name: tesslate-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./orchestrator/app:/app/app
      - ./orchestrator/pyproject.toml:/app/pyproject.toml
      - ./orchestrator/users:/app/users
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./orchestrator.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEPLOYMENT_MODE=docker
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-your-domain.com,studio-test.tesslate.com,studio-demo.tesslate.com,localhost,*.localhost}
      - PYTHONUNBUFFERED=1
      - WATCHFILES_FORCE_POLLING=true
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`api.localhost`)"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build: ./app
    container_name: tesslate-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./app/src:/app/src
      - ./app/public:/app/public
      - ./app/index.html:/app/index.html
      - ./app/vite.config.ts:/app/vite.config.ts
      - ./app/tsconfig.json:/app/tsconfig.json
      - ./app/tsconfig.app.json:/app/tsconfig.app.json
      - ./app/tsconfig.node.json:/app/tsconfig.node.json
      - ./app/tailwind.config.ts:/app/tailwind.config.ts
      - ./app/package.json:/app/package.json
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_ALLOWED_HOSTS=${ALLOWED_HOSTS:-your-domain.com,studio-test.tesslate.com,studio-demo.tesslate.com,localhost,host.docker.internal,.localhost}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`studio.localhost`)"
      - "traefik.http.services.app.loadbalancer.server.port=5173"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Dev server base image - Used for user project containers
  # This service doesn't run, it just builds the image
  # Rebuild after template changes: docker compose build dev-server
  dev-server:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile.devserver
    image: builder-devserver:latest
    profiles:
      - build-only
    # This service is only for building the image, not running
    command: ["echo", "Dev server image built successfully"]

networks:
  tesslate-network:
    name: tesslate-network
    driver: bridge