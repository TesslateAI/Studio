services:
  traefik:
    image: traefik:v3.1
    container_name: tesslate-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tesslate-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=dev@localhost"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--log.level=INFO"

  orchestrator:
    build: ./orchestrator
    container_name: tesslate-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./orchestrator:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./orchestrator.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`api.localhost`)"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8000"

  app:
    build: ./app
    container_name: tesslate-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_AI_SERVICE_URL=http://localhost:8001
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`studio.localhost`)"
      - "traefik.http.services.app.loadbalancer.server.port=5173"

  ai-service:
    build: ./ai-service
    container_name: tesslate-ai-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ORCHESTRATOR_URL=http://orchestrator:8000
    networks:
      - tesslate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-service.rule=Host(`ai.localhost`)"
      - "traefik.http.services.ai-service.loadbalancer.server.port=8001"

networks:
  tesslate-network:
    name: tesslate-network
    driver: bridge