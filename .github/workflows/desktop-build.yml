name: Desktop Build

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      sign:
        description: 'Attempt code-signing (requires cert secrets in repo)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # ── Linux system deps ─────────────────────────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      # ── Python / sidecar ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sidecar build deps
        working-directory: orchestrator
        run: |
          python -m pip install --upgrade pip
          pip install -e "../packages/tesslate-agent"
          pip install -e ".[dev]"
          pip install pyinstaller

      # ── SQLite migration smoke test ───────────────────────────────────────
      - name: Smoke-test migrations on fresh SQLite
        working-directory: orchestrator
        run: alembic upgrade head
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci-smoke.db
          SECRET_KEY: ci-smoke-key
          DEPLOYMENT_MODE: desktop

      # ── Build sidecar ─────────────────────────────────────────────────────
      - name: Build sidecar
        working-directory: desktop/sidecar
        run: python build_sidecar.py

      # ── Install tauri-cli ─────────────────────────────────────────────────
      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2.0' --locked

      # ── Build Tauri app ───────────────────────────────────────────────────
      - name: Build Tauri app
        working-directory: desktop/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          # macOS signing — no-op when secrets are absent
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          # Windows signing — no-op when secrets are absent
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_SIGNING_CERT || '' }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD || '' }}
          # Tauri updater signing — no-op when secret absent (produces unsigned manifest)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesslate-studio-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30
