[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tesslate-app-sdk"
version = "0.1.0"
description = "Author, publish, install, and invoke Tesslate Apps from Python."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Tesslate" }]
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.5",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tesslate_app_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
