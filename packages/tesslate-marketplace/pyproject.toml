[project]
name = "tesslate-marketplace"
version = "0.1.0"
description = "Federated marketplace service implementing the Tesslate /v1 protocol"
authors = [{ name = "Tesslate", email = "engineering@tesslate.com" }]
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
readme = "README.md"

dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "aiosqlite>=0.19",
    "alembic>=1.13",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "httpx>=0.27",
    "cryptography>=42",
    "zstandard>=0.22",
    "stripe>=8.0",
    "python-multipart>=0.0.9",
    "pyyaml>=6.0",
    "greenlet>=3.0",
    # boto3 powers S3BundleStorage (app/services/cas.py). Cloud deploys
    # set BUNDLE_STORAGE_BACKEND=s3 and need this; LocalBundleStorage
    # and the in-memory test paths never import boto3 so the cost on
    # desktop / minikube is one extra pip install at build time.
    "boto3>=1.34",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
