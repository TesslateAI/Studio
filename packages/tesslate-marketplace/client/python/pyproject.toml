[project]
name = "tesslate-marketplace-client"
version = "0.1.0"
description = "Async Python client for the Tesslate federated marketplace /v1 protocol"
requires-python = ">=3.11"
authors = [{ name = "Tesslate", email = "engineering@tesslate.com" }]
license = { text = "Apache-2.0" }
readme = "README.md"

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tesslate_marketplace_client"]
